<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grace Before Meals – Prayer Generator | Daily Prayers & Blessings</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #fdf8f2;
    --warm-white: #fff9f4;
    --brown-deep: #3b1f0e;
    --brown-mid: #7a4f2e;
    --brown-light: #b07d52;
    --brown-pale: #e8d5c0;
    --brown-faint: #f3e9de;
    --accent: #8b4513;
    --accent-hover: #6f3610;
    --green-soft: #2d6a4f;
    --border: #dcc9b2;
    --text-primary: #2c1a0e;
    --text-secondary: #6b4c35;
    --text-muted: #a07855;
  }

  html { font-size: 16px; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 0;
    margin: 0;
  }

  .page-wrap {
    max-width: 640px;
    margin: 0 auto;
    padding: 2.5rem 1.25rem 3rem;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 2.25rem;
  }
  .site-badge {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--brown-light);
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    margin-bottom: 10px;
  }
  .main-title {
    font-family: 'Lora', Georgia, serif;
    font-size: 2rem;
    font-weight: 500;
    color: var(--brown-deep);
    line-height: 1.25;
    margin-bottom: 8px;
  }
  .main-sub {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.6;
  }

  /* Divider */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.75rem 0;
  }

  /* Section label */
  .section-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
    font-family: 'DM Sans', sans-serif;
  }

  /* Occasion grid */
  .occasion-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 0;
  }

  .occasion-btn {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 16px 14px 14px;
    cursor: pointer;
    text-align: left;
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.18s, background 0.18s, transform 0.1s;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }
  .occasion-btn:hover {
    border-color: var(--brown-light);
    background: var(--brown-faint);
  }
  .occasion-btn:active { transform: scale(0.98); }
  .occasion-btn.selected {
    border: 2px solid var(--accent);
    background: var(--brown-faint);
  }
  .occ-icon {
    font-size: 22px;
    display: block;
    margin-bottom: 8px;
    line-height: 1;
  }
  .occ-name {
    display: block;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 2px;
    font-family: 'DM Sans', sans-serif;
  }
  .occ-desc {
    display: block;
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
  }
  .occasion-btn.selected .occ-name { color: var(--accent); }
  .occasion-btn.selected .occ-desc { color: var(--brown-mid); }

  /* Tone chips */
  .tone-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .tone-chip {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 999px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.18s;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
    line-height: 1.3;
  }
  .tone-chip:hover {
    border-color: var(--brown-light);
    background: var(--brown-faint);
  }
  .tone-chip.selected {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* Generate button */
  .gen-btn {
    width: 100%;
    padding: 15px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.18s, transform 0.1s;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
    display: block;
    letter-spacing: 0.01em;
  }
  .gen-btn:hover:not(:disabled) { background: var(--accent-hover); }
  .gen-btn:active:not(:disabled) { transform: scale(0.99); }
  .gen-btn:disabled {
    background: var(--brown-pale);
    color: var(--text-muted);
    cursor: not-allowed;
  }

  /* Result card */
  .result-card {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem 1.5rem 1.25rem;
    display: none;
    margin-top: 1.5rem;
  }
  .result-card.visible { display: block; }

  .result-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--brown-faint);
    border-radius: 999px;
    padding: 4px 12px;
    margin-bottom: 1rem;
    font-family: 'DM Sans', sans-serif;
  }

  .cross-row {
    text-align: center;
    font-size: 20px;
    color: var(--brown-pale);
    margin-bottom: 1rem;
    letter-spacing: 4px;
  }

  .prayer-text {
    font-family: 'Lora', Georgia, serif;
    font-size: 15.5px;
    line-height: 1.85;
    color: var(--text-primary);
    margin-bottom: 1.25rem;
  }

  .verse-block {
    background: var(--brown-faint);
    border-left: 3px solid var(--brown-light);
    border-radius: 0 10px 10px 0;
    padding: 12px 14px;
    margin-bottom: 1.25rem;
  }
  .verse-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 5px;
    font-family: 'DM Sans', sans-serif;
  }
  .verse-text {
    font-family: 'Lora', Georgia, serif;
    font-size: 13.5px;
    color: var(--text-secondary);
    line-height: 1.65;
    font-style: italic;
  }
  .verse-ref {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
    font-family: 'DM Sans', sans-serif;
  }

  .action-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .action-btn {
    flex: 1;
    min-width: 90px;
    padding: 10px 12px;
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.15s, border-color 0.15s;
    text-align: center;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }
  .action-btn:hover {
    background: var(--brown-faint);
    border-color: var(--brown-light);
  }
  .action-btn.copied {
    color: var(--green-soft);
    border-color: var(--green-soft);
    background: #f0faf6;
  }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 2.5rem;
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
  }
  .footer a { color: var(--brown-light); text-decoration: none; }

  @media (max-width: 420px) {
    .main-title { font-size: 1.65rem; }
    .occasion-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    .action-row { flex-direction: column; }
    .action-btn { flex: none; width: 100%; }
  }
</style>
</head>
<body>
<div class="page-wrap">

  <div class="header">
    <span class="site-badge">Daily Prayers &amp; Blessings</span>
    <h1 class="main-title">Grace Before Meals</h1>
    <p class="main-sub">Choose your occasion and receive a heartfelt blessing for your table.</p>
  </div>

  <p class="section-label">Choose your occasion</p>
  <div class="occasion-grid">
    <button class="occasion-btn" data-occasion="everyday" onclick="selectOccasion(this)">
      <span class="occ-icon">🍽️</span>
      <span class="occ-name">Everyday meal</span>
      <span class="occ-desc">A simple daily grace</span>
    </button>
    <button class="occasion-btn" data-occasion="sunday" onclick="selectOccasion(this)">
      <span class="occ-icon">⛪</span>
      <span class="occ-name">Sunday meal</span>
      <span class="occ-desc">After worship, with family</span>
    </button>
    <button class="occasion-btn" data-occasion="birthday" onclick="selectOccasion(this)">
      <span class="occ-icon">🎂</span>
      <span class="occ-name">Birthday celebration</span>
      <span class="occ-desc">Honouring a special person</span>
    </button>
    <button class="occasion-btn" data-occasion="holiday" onclick="selectOccasion(this)">
      <span class="occ-icon">✨</span>
      <span class="occ-name">Holiday gathering</span>
      <span class="occ-desc">Christmas, Easter &amp; more</span>
    </button>
  </div>

  <hr class="divider">

  <p class="section-label">Tone of the blessing</p>
  <div class="tone-row">
    <button class="tone-chip" data-tone="warm" onclick="selectTone(this)">Warm &amp; personal</button>
    <button class="tone-chip" data-tone="reverent" onclick="selectTone(this)">Reverent &amp; traditional</button>
    <button class="tone-chip" data-tone="short" onclick="selectTone(this)">Short &amp; simple</button>
    <button class="tone-chip" data-tone="family" onclick="selectTone(this)">For the whole family</button>
  </div>

  <hr class="divider">

  <button class="gen-btn" id="genBtn" onclick="generatePrayer()" disabled>Receive your blessing</button>

  <div class="result-card" id="resultCard">
    <span class="result-tag" id="resultTag"></span>
    <div class="cross-row">✦ ✦ ✦</div>
    <p class="prayer-text" id="prayerText"></p>
    <div class="verse-block">
      <p class="verse-label">Scripture</p>
      <p class="verse-text" id="verseText"></p>
      <p class="verse-ref" id="verseRef"></p>
    </div>
    <div class="action-row">
      <button class="action-btn" id="copyBtn" onclick="copyPrayer()">Copy blessing</button>
      <button class="action-btn" onclick="shareWhatsApp()">Share on WhatsApp</button>
      <button class="action-btn" onclick="generatePrayer()">New blessing</button>
    </div>
  </div>

  <div class="footer">
    <p>A free tool by <a href="https://dailyprayersandblessings.com" target="_blank">DailyPrayersAndBlessings.com</a></p>
  </div>

</div>
<script>
const prayers = {
  everyday: {
    warm: [
      { prayer: "Lord, thank You for this meal before us and for the hands that prepared it. You provide for us day after day, and we do not take a single bite for granted. May this food nourish our bodies and may this table be a place of love and laughter. In Jesus name, Amen.", verse: "Give us this day our daily bread.", ref: "Matthew 6:11 (ESV)" },
      { prayer: "Heavenly Father, we pause before this meal to remember that every good gift comes from You. Thank You for filling our table and for filling our lives with Your goodness. Bless this food and bless everyone seated here. Amen.", verse: "Every good gift and every perfect gift is from above, coming down from the Father of lights.", ref: "James 1:17 (ESV)" },
      { prayer: "Father, we thank You for Your faithfulness seen in every meal, in every provision, in every ordinary day. Bless this food we are about to receive. Let it strengthen us to love You and to love others well. Amen.", verse: "His mercies are new every morning; great is his faithfulness.", ref: "Lamentations 3:23 (NLT)" },
    ],
    reverent: [
      { prayer: "Almighty God, we bow before You in gratitude as we receive this gift of food. You are the source of all life and all provision. May we eat with thankful hearts, mindful of Your mercy that sustains us each day. Through Christ our Lord, Amen.", verse: "Oh give thanks to the Lord, for he is good, for his steadfast love endures forever!", ref: "Psalm 107:1 (ESV)" },
      { prayer: "Lord God, we consecrate this meal to You. You have opened Your hand and satisfied our need. We receive this food as a gift from Your gracious hand and ask that You bless it for our bodies and our spirits. Amen.", verse: "You open your hand; you satisfy the desire of every living thing.", ref: "Psalm 145:16 (ESV)" },
    ],
    short: [
      { prayer: "Lord, thank You for this food, for those who made it, and for the blessing of being together. Amen.", verse: "Rejoice always, pray without ceasing, give thanks in all circumstances.", ref: "1 Thessalonians 5:16-18 (ESV)" },
      { prayer: "Father, we are grateful. Bless this meal and bless each of us. Amen.", verse: "Give thanks to the Lord, for he is good.", ref: "Psalm 107:1 (ESV)" },
      { prayer: "Thank You, God, for this food and for Your constant provision. Amen.", verse: "My God will supply every need of yours.", ref: "Philippians 4:19 (ESV)" },
    ],
    family: [
      { prayer: "Father, we gather as a family around this table and we are grateful. Thank You for the food, for our health, and for each person here. May we be as nourished in love and spirit as we are in body. Bless our home and bless this meal. In Jesus name, Amen.", verse: "As for me and my house, we will serve the Lord.", ref: "Joshua 24:15 (ESV)" },
      { prayer: "Lord, we thank You for the gift of family and the blessing of shared meals. You have provided, and we trust that You always will. Bless this food and bless the hearts around this table. Amen.", verse: "Behold, how good and pleasant it is when kindred live together in unity!", ref: "Psalm 133:1 (ESV)" },
    ],
  },
  sunday: {
    warm: [
      { prayer: "Lord, what a blessing this Sunday is. We have gathered to worship You, and now we gather again around this table. Thank You for Your Word that fed our souls and for this food that will feed our bodies. May the rest of this day be filled with Your peace. Amen.", verse: "This is the day that the Lord has made; let us rejoice and be glad in it.", ref: "Psalm 118:24 (ESV)" },
      { prayer: "Father, Sundays remind us of who You are and whose we are. We praise You for the morning of worship and for the blessing of this meal shared with those we love. May Your goodness mark this whole day. Amen.", verse: "The Lord bless you and keep you; the Lord make his face shine on you.", ref: "Numbers 6:24-25 (NIV)" },
    ],
    reverent: [
      { prayer: "Lord of the Sabbath, we thank You for the day You have set apart for rest, worship, and renewal. As we receive this meal, we carry the hymns and Your Word still in our hearts. Sanctify this table as You have sanctified this day. Through Christ, Amen.", verse: "Remember the Sabbath day, to keep it holy.", ref: "Exodus 20:8 (ESV)" },
      { prayer: "Heavenly Father, this Sunday table is an extension of Your sanctuary. We ate of Your Word this morning; now we eat of Your provision. You are faithful to nourish us body and soul. We receive this meal with gratitude and reverence. Amen.", verse: "Man shall not live by bread alone, but by every word that comes from the mouth of God.", ref: "Matthew 4:4 (ESV)" },
    ],
    short: [
      { prayer: "Lord, thank You for this Sunday and for this meal. You have blessed us richly, body and soul. Amen.", verse: "This is the day that the Lord has made; let us rejoice.", ref: "Psalm 118:24 (ESV)" },
    ],
    family: [
      { prayer: "Father, Sunday belongs to You, and so do we. We have worshipped together and now we eat together, grateful for both gifts. Bless this family meal and let Your peace rest over our home for the rest of this day. Amen.", verse: "Blessed is everyone who fears the Lord, who walks in his ways!", ref: "Psalm 128:1 (ESV)" },
    ],
  },
  birthday: {
    warm: [
      { prayer: "Lord, today we celebrate the gift of this special life. You formed them, You love them, and You have plans for them greater than we can imagine. Bless this meal and bless this moment of celebration. May this year ahead be full of Your goodness and surprises. In Jesus name, Amen.", verse: "For I know the plans I have for you, declares the Lord, plans to prosper you and not to harm you, plans to give you hope and a future.", ref: "Jeremiah 29:11 (NIV)" },
      { prayer: "Father, thank You for placing this person in our lives. Every birthday is a reminder of Your faithfulness through another year. Bless this celebration, bless this food, and bless the one we are honouring today. May they feel Your love deeply. Amen.", verse: "The Lord bless you and keep you; the Lord make his face shine on you and be gracious to you.", ref: "Numbers 6:24-25 (NIV)" },
      { prayer: "Heavenly Father, we gather today to celebrate a life that is a gift from You. Thank You for every year You have given, for every blessing poured out, and for the year ahead. Bless this table and bless the one we love. Amen.", verse: "This is the day that the Lord has made; let us rejoice and be glad in it.", ref: "Psalm 118:24 (ESV)" },
    ],
    reverent: [
      { prayer: "Lord God, birthdays are a holy reminder that every life is Your design. We thank You for the years You have given and for the faithfulness You have shown. As we celebrate, we invite Your continued blessing over this life and over this meal. Amen.", verse: "Your eyes saw my unformed substance; in your book were written every one of the days that were formed for me.", ref: "Psalm 139:16 (ESV)" },
    ],
    short: [
      { prayer: "Lord, thank You for this birthday and for the beautiful life we are celebrating. Bless this meal and bless the year ahead. Amen.", verse: "May the Lord bless you and keep you.", ref: "Numbers 6:24 (NIV)" },
    ],
    family: [
      { prayer: "Father, what a joy to celebrate one of our own today. You knit them together with love and purpose, and we are better because they are in our family. Bless this celebration meal and let laughter and love fill every moment around this table. Amen.", verse: "Children are a heritage from the Lord, the fruit of the womb a reward.", ref: "Psalm 127:3 (ESV)" },
      { prayer: "Lord, today our family gathers around someone very special. Thank You for the gift of another year and for all the memories shared. May this birthday meal be a foretaste of Your goodness still to come in their life. Amen.", verse: "I will pour out my Spirit on all people. Your sons and daughters will prophesy.", ref: "Joel 2:28 (NIV)" },
    ],
  },
  holiday: {
    warm: [
      { prayer: "Lord, this gathering is one of Your greatest gifts to us. Thank You for the season, for those who have travelled to be here, and for the love that fills this room. Bless the food on this table and the hearts around it. May this holiday meal be a memory we carry for years. Amen.", verse: "Give thanks to the Lord, for he is good; his love endures forever.", ref: "Psalm 107:1 (NIV)" },
      { prayer: "Father, the holidays remind us that You gave the greatest gift of all, Your Son. As we gather and give gifts to one another, help us to receive the gift of this moment with gratitude. Bless this meal and bless every person at this table. Amen.", verse: "For God so loved the world, that he gave his only Son.", ref: "John 3:16 (ESV)" },
      { prayer: "Lord, this is the season of Your faithfulness made visible. Thank You for family, for friends, and for the food before us. Bless this holiday table and help us to be truly present with one another today. Amen.", verse: "Great is his faithfulness; his mercies begin afresh each morning.", ref: "Lamentations 3:23 (NLT)" },
    ],
    reverent: [
      { prayer: "Heavenly Father, we pause before this holiday feast to acknowledge that all of this, every gift, every person, every blessing of the season, comes from You. We receive this meal with hearts full of gratitude. May Christ be the centre of this celebration and of every day. Amen.", verse: "Thanks be to God for his inexpressible gift!", ref: "2 Corinthians 9:15 (ESV)" },
      { prayer: "Lord of all seasons, we come before You at this holiday table in worship and thanksgiving. You have been faithful through all our years. Receive our gratitude and bless this meal as a symbol of Your endless provision. Through Christ our Lord, Amen.", verse: "Every good gift and every perfect gift is from above.", ref: "James 1:17 (ESV)" },
    ],
    short: [
      { prayer: "Lord, thank You for this season, for those around this table, and for the food You have provided. Amen.", verse: "Give thanks to the Lord, for he is good.", ref: "Psalm 107:1 (NIV)" },
      { prayer: "Father, we are grateful for this holiday gathering. Bless this meal and every heart here. Amen.", verse: "Thanks be to God for his inexpressible gift.", ref: "2 Corinthians 9:15 (ESV)" },
    ],
    family: [
      { prayer: "Father, the holidays are made beautiful by the people You have placed in our lives. Thank You for this family, near and far, for the laughter and the love that fills this home today. Bless this meal and make this gathering one we will always remember. In Jesus name, Amen.", verse: "How good and pleasant it is when families live together in harmony!", ref: "Psalm 133:1 (NLT)" },
      { prayer: "Lord, the greatest blessing of any holiday is simply being together. Thank You for the gift of this family. Bless the food, bless the conversation, and bless every person around this table. Amen.", verse: "The Lord bless you and keep you; the Lord make his face shine on you.", ref: "Numbers 6:24-25 (NIV)" },
    ],
  },
};

const occasionLabels = {
  everyday: "Everyday meal",
  sunday: "Sunday meal",
  birthday: "Birthday celebration",
  holiday: "Holiday gathering"
};

let selectedOccasion = null;
let selectedTone = null;

function selectOccasion(el) {
  document.querySelectorAll('.occasion-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedOccasion = el.dataset.occasion;
  updateBtn();
}

function selectTone(el) {
  document.querySelectorAll('.tone-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedTone = el.dataset.tone;
  updateBtn();
}

function updateBtn() {
  document.getElementById('genBtn').disabled = !(selectedOccasion && selectedTone);
}

function generatePrayer() {
  const pool = prayers[selectedOccasion][selectedTone] || prayers[selectedOccasion]['warm'];
  const item = pool[Math.floor(Math.random() * pool.length)];
  document.getElementById('resultTag').textContent = occasionLabels[selectedOccasion];
  document.getElementById('prayerText').textContent = item.prayer;
  document.getElementById('verseText').textContent = '\u201C' + item.verse + '\u201D';
  document.getElementById('verseRef').textContent = '\u2014 ' + item.ref;
  const card = document.getElementById('resultCard');
  card.classList.add('visible');
  const copyBtn = document.getElementById('copyBtn');
  copyBtn.textContent = 'Copy blessing';
  copyBtn.classList.remove('copied');
  setTimeout(function() {
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 50);
}

function copyPrayer() {
  const prayer = document.getElementById('prayerText').textContent;
  const verse = document.getElementById('verseText').textContent;
  const ref = document.getElementById('verseRef').textContent;
  const full = prayer + '\n\n' + verse + '\n' + ref + '\n\nFrom DailyPrayersAndBlessings.com';
  navigator.clipboard.writeText(full).then(function() {
    var btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(function() {
      btn.textContent = 'Copy blessing';
      btn.classList.remove('copied');
    }, 2500);
  });
}

function shareWhatsApp() {
  var prayer = document.getElementById('prayerText').textContent;
  var verse = document.getElementById('verseText').textContent;
  var ref = document.getElementById('verseRef').textContent;
  var msg = encodeURIComponent('A blessing before our meal:\n\n' + prayer + '\n\n' + verse + '\n' + ref + '\n\nFrom DailyPrayersAndBlessings.com');
  window.open('https://wa.me/?text=' + msg, '_blank');
}
</script>
</body>
</html>
